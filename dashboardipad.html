<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}

  #bg{
    position:fixed;top:0;right:0;bottom:0;left:0;
    background-size:cover;background-position:center;background-repeat:no-repeat;
    transition:opacity 1.2s ease;
    z-index:0;
    background-color:#0f1923;
  }

  #overlay{
    position:fixed;top:0;right:0;bottom:0;left:0;
    background:linear-gradient(
      to bottom,
      rgba(0,0,0,0.58) 0%,
      rgba(0,0,0,0.12) 38%,
      rgba(0,0,0,0.08) 55%,
      rgba(0,0,0,0.72) 100%
    );
    z-index:1;
  }

  body{
    display:flex;flex-direction:column;
    padding:52px 28px 38px;
    height:100%;position:relative;z-index:2;
    font-family:'DM Mono',monospace;
    color:#fff;
  }

  #top{flex-shrink:0;}

  #date-line{
    font-family:'Syne',sans-serif;
    font-size:11px;font-weight:600;
    letter-spacing:0.28em;text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    margin-bottom:8px;
  }

  #time-display{
    font-family:'Syne',sans-serif;
    font-size:84px;font-weight:800;
    letter-spacing:-4px;line-height:1;
    color:#fff;
    text-shadow:0 4px 32px rgba(0,0,0,0.5);
  }

  #time-display .colon{animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0.12;}}

  #seconds{
    font-size:13px;color:rgba(255,255,255,0.42);
    margin-top:6px;letter-spacing:0.14em;
  }

  #prog-wrap{margin-top:20px;}
  #prog-labels{
    display:flex;justify-content:space-between;
    font-size:9px;color:rgba(255,255,255,0.35);
    margin-bottom:6px;letter-spacing:0.08em;
  }
  #prog-bar{
    height:2px;background:rgba(255,255,255,0.10);
    border-radius:99px;overflow:hidden;
  }
  #prog-fill{
    height:100%;
    background:linear-gradient(90deg,rgba(255,255,255,0.95),rgba(255,255,255,0.35));
    border-radius:99px;transition:width 1s linear;
  }

  #stats{
    display:flex;gap:0;
    margin-top:32px;flex-shrink:0;
  }
  .stat{
    flex:1;text-align:center;
    padding:13px 8px;
    background:rgba(0,0,0,0.45);
    border:0.5px solid rgba(255,255,255,0.10);
  }
  .stat:first-child{border-radius:12px 0 0 12px;}
  .stat:last-child{border-radius:0 12px 12px 0;}
  .stat+.stat{border-left:none;}
  .stat-val{
    font-family:'Syne',sans-serif;
    font-size:24px;font-weight:700;
    color:#fff;line-height:1;
  }
  .stat-label{
    font-size:9px;color:rgba(255,255,255,0.40);
    letter-spacing:0.16em;text-transform:uppercase;
    margin-top:5px;
  }

  #spacer{flex:1;}

  #bottom{flex-shrink:0;}

  #park-name{
    font-family:'Syne',sans-serif;
    font-size:10px;font-weight:600;
    letter-spacing:0.22em;text-transform:uppercase;
    color:rgba(255,255,255,0.42);
    margin-bottom:12px;
    display:flex;align-items:center;gap:10px;
  }
  #park-name::before{
    content:'';display:inline-block;
    width:20px;height:1px;
    background:rgba(255,255,255,0.28);
    flex-shrink:0;
  }

  #quote-box{
    background:rgba(0,0,0,0.48);
    border:0.5px solid rgba(255,255,255,0.10);
    border-radius:16px;
    padding:20px 22px;
  }
  #quote-text{
    font-family:'Syne',sans-serif;
    font-size:14px;font-weight:400;
    color:rgba(255,255,255,0.90);
    line-height:1.68;font-style:italic;
    border-left:2px solid rgba(255,255,255,0.28);
    padding-left:16px;
  }
  #quote-author{
    font-size:10px;
    color:rgba(255,255,255,0.38);
    letter-spacing:0.16em;text-transform:uppercase;
    margin-top:12px;padding-left:18px;
  }

  #footer{
    margin-top:16px;
    text-align:center;
    font-size:9px;color:rgba(255,255,255,0.20);
    letter-spacing:0.20em;text-transform:uppercase;
  }
</style>
</head>

</div>

<div id="spacer"></div>

<div id="bottom">

  <div id="quote-box">
    <div id="quote-text">—</div>

function pad(n){return String(n).padStart(2,'0');}

function getDayOfYear(d){
  var start=new Date(d.getFullYear(),0,0);
  return Math.floor((d-start)/86400000);
}

function updateClock(){
  var now=new Date();
  document.getElementById('h').textContent=pad(now.getHours());
  document.getElementById('m').textContent=pad(now.getMinutes());
  document.getElementById('s').textContent=pad(now.getSeconds());
  var dias=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  var meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('date-line').textContent=dias[now.getDay()]+', '+now.getDate()+' de '+meses[now.getMonth()]+' de '+now.getFullYear();
  var mins=now.getHours()*60+now.getMinutes();
  var pct=Math.round((mins/1440)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('pct-label').textContent=pct+'% do dia';
  var day=getDayOfYear(now);
  document.getElementById('day-num').textContent=day;
  document.getElementById('week-num').textContent=Math.ceil(day/7);
  var cbo=new Date(now.getFullYear(),10,1);
  if(now>cbo) cbo.setFullYear(cbo.getFullYear()+1);
  document.getElementById('days-left').textContent=Math.ceil((cbo-now)/86400000);
}

function initDailyContent(){
  var day=getDayOfYear(new Date());
  var park=PARKS[day%PARKS.length];
  var img=new Image();
  img.onload=function(){
    document.getElementById('bg').style.backgroundImage='url('+park.url+')';
    document.getElementById('park-name').textContent=park.name;
  };
  img.onerror=function(){
    document.getElementById('bg').style.background='linear-gradient(160deg,#1a1a2e,#16213e,#0f3460)';
    document.getElementById('park-name').textContent='Parque Nacional';
  };
  img.src=park.url;
  var q=QUOTES[(day-1)%QUOTES.length];
  document.getElementById('quote-text').textContent=q[0];
  document.getElementById('quote-author').textContent='— '+q[1];
}

initDailyContent();
setInterval(updateClock,1000);
updateClock();
</script>
