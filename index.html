<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0a0e1a; color: #fff; font-family: Georgia, serif; overflow: hidden; }
#bg {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-size: cover; background-position: center;
  z-index: 0;
}
#overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1;
}
#app {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 2;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-orient: vertical;
  -webkit-flex-direction: column;
  flex-direction: column;
  padding: 48px 28px 36px;
}
#time {
  font-size: 88px;
  font-weight: bold;
  letter-spacing: -4px;
  line-height: 1;
  color: #fff;
}
#date {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-top: 8px;
  font-family: Arial, sans-serif;
}
#secs {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
  font-family: Arial, sans-serif;
}
#prog-bar {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  margin-top: 16px;
  overflow: hidden;
}
#prog-fill {
  height: 100%;
  background: rgba(255,255,255,0.75);
  border-radius: 2px;
  width: 0%;
}
#stats {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  margin-top: 28px;
  border-radius: 10px;
  overflow: hidden;
}
.stat {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  text-align: center;
  padding: 12px 4px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.07);
  font-family: Arial, sans-serif;
}
.stat + .stat { border-left: none; }
.stat-n { font-size: 22px; font-weight: bold; color: #fff; line-height: 1; }
.stat-l { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
#middle { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; }
#park {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 10px;
  font-family: Arial, sans-serif;
}
#quote-box {
  background: rgba(0,0,0,0.48);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 18px 20px;
}
#quote-text {
  font-size: 14px;
  color: rgba(255,255,255,0.88);
  line-height: 1.65;
  font-style: italic;
  border-left: 2px solid rgba(255,255,255,0.25);
  padding-left: 14px;
}
#quote-author {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 10px;
  padding-left: 16px;
  font-family: Arial, sans-serif;
}
#footer {

  text-align: center;
  font-size: 9px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: Arial, sans-serif;

var DIAS = ["Domingo","Segunda-feira","Terca-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sabado"];
var MESES = ["janeiro","fevereiro","marco","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function pad(n) {
  n = String(n);
  return n.length < 2 ? '0' + n : n;
}

function getDoy(d) {
  var start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((d - start) / 86400000);
}

function tick() {
  try {
    var now = new Date();
    var h = pad(now.getHours());
    var m = pad(now.getMinutes());
    var s = pad(now.getSeconds());
    document.getElementById('time').textContent = h + ':' + m;
    document.getElementById('secs').textContent = s + 's';
    var mins = now.getHours() * 60 + now.getMinutes();
    var pct = Math.round((mins / 1440) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    var day = getDoy(now);
    document.getElementById('st-dy').textContent = day;
    document.getElementById('st-wk').textContent = Math.ceil(day / 7);
    var cbo = new Date(now.getFullYear(), 10, 1);
    if (now > cbo) { cbo.setFullYear(cbo.getFullYear() + 1); }
    document.getElementById('st-cb').textContent = Math.ceil((cbo - now) / 86400000);
    var ds = DIAS[now.getDay()] + ', ' + now.getDate() + ' de ' + MESES[now.getMonth()] + ' de ' + now.getFullYear();
    document.getElementById('date').textContent = ds;

function loadBg() {
  try {
    document.getElementById('bg').style.backgroundImage = 'url(' + BG_IMG + ')';
    document.getElementById('park').textContent = 'Deserto ao por do sol';
    var day = getDoy(new Date());
    var qi = (day - 1) % QUOTES.length;
    var parts = QUOTES[qi].split(' -- ');
    document.getElementById('quote-text').textContent = parts[0] || QUOTES[qi];
    document.getElementById('quote-author').textContent = parts[1] ? '-- ' + parts[1] : '';
  } catch(e) {}
}

loadBg();
tick();
setInterval(tick, 1000);
